app:
  replicaCount: 1
  # Joined with " && " by the template, so keep it as a single shell string.
  command: ["php artisan optimize && php artisan octane:start --host=0.0.0.0 --port=80 --admin-port=2020"]
  healthEndpoint: "/up"
  migrate:
    enabled: true
    seed: false
  resources:
    requests:
      memory: 512Mi
      cpu: 5m
    limits:
      memory: 1024Mi
      cpu: 1000m
  pdb:
    minAvailable: 1
horizon:
  enabled: false
  replicaCount: 1
  resources:
    requests:
      memory: 20Mi
      cpu: 5m
    limits:
      memory: 500Mi
      cpu: 1000m
cron:
  resources:
    requests:
      memory: 20Mi
      cpu: 5m
    limits:
      memory: 500Mi
      cpu: 1000m
queue:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: 20Mi
      cpu: 5m
    limits:
      memory: 500Mi
      cpu: 1000m
reverb:
  replicaCount: 1
  enabled: false
  resources:
    requests:
      memory: 20Mi
      cpu: 5m
    limits:
      memory: 500Mi
      cpu: 1000m

typesense:
  enabled: false
  replicaCount: 1
  image:
    repository: typesense/typesense
    tag: "27.1"
    pullPolicy: IfNotPresent
  resources:
    requests:
      memory: 512Mi
      cpu: 100m
    limits:
      memory: 1Gi
      cpu: 500m
  storage:
    size: 10Gi
    storageClass: ""

# valkey (redis-compatible)
valkey:
  enabled: true
  replicaCount: 1
  resources:
    requests:
      memory: 500Mi
      cpu: 50m
    limits:
      memory: 2Gi
      cpu: 2

infisical:
  enabled: true
  hostAPI: http://infisical-infisical-standalone-infisical.infisical.svc.cluster.local:8080/api
  projectSlug: fursuit-badges-hmoi
  envSlug: dev
  secretsPath: "/"
  recursive: true
  credentialsRef:
    secretName: universal-auth-credentials
    secretNamespace: infisical
  managedSecretReference:
    secretName: env-secret
    creationPolicy: "Owner"

ingress:
  host: fursuit.dev.eurofurence.org
  # Alternative: use hosts for multiple hosts
  # hosts:
  #   - ef-streaming.eurofurence.org
  #   - another-domain.com
  pathPrefix: ""  # Set to "/your-app" to host under domain.com/your-app
  annotations: {}

image:
  repository: ghcr.io/eurofurence/fursuit-reg-tool
  pullPolicy: IfNotPresent
  tag: dev-night-latest

# phpMyAdmin — EMERGENCY database access ONLY.
#
# This is the break-glass backup path to the database and is DISABLED by default:
# when `enabled` is false nothing below is rendered (no Deployment, Service or
# ingress route is created at all).
#
# Helm renders templates client-side and cannot read the Infisical-managed
# `ENABLE_EMERGENCY_DB_ACCESS` secret (it only exists in-cluster at runtime), so
# this `enabled` flag is the gate. Wire it to that Infisical value in your
# GitOps/values pipeline (e.g. set `phpmyadmin.enabled=true` when
# ENABLE_EMERGENCY_DB_ACCESS is True), flip it on only while you need access,
# then turn it back off.
phpmyadmin:
  enabled: false
  image:
    repository: phpmyadmin
    tag: "5.2"
    pullPolicy: IfNotPresent
  # Path appended to the ingress host (and ingress.pathPrefix, if set).
  path: /devmyphpadmin
  # Arbitrary-server mode: the DB host + credentials are typed on the phpMyAdmin
  # login page rather than baked in. Set to false to lock it to a fixed host.
  arbitrary: true
  # Externally-visible URL phpMyAdmin uses to build links. Leave empty to derive
  # it automatically as https://<ingress host><pathPrefix>/devmyphpadmin/.
  absoluteUri: ""
  # Max import/upload size (passed to phpMyAdmin and the ingress proxy-body-size).
  uploadLimit: 256M
  resources:
    requests:
      memory: 64Mi
      cpu: 10m
    limits:
      memory: 256Mi
      cpu: 500m
  ingress:
    # Extra annotations for the phpMyAdmin ingress, e.g. an IP allow-list:
    #   nginx.ingress.kubernetes.io/whitelist-source-range: "1.2.3.4/32"
    annotations: {}