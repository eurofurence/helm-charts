{{- if .Values.phpmyadmin.enabled }}
{{- /*
  EMERGENCY database access via phpMyAdmin. Rendered ONLY when
  .Values.phpmyadmin.enabled is true (the break-glass gate). Served under
  <ingress host><pathPrefix>/devmyphpadmin via a dedicated Ingress that rewrites
  the sub-path away before proxying (the official phpMyAdmin image serves from /,
  and an ingress-wide rewrite-target must not leak onto the main app ingress).
*/}}
{{- $prefix := .Values.ingress.pathPrefix | default "" -}}
{{- $pmaPath := printf "%s%s" $prefix .Values.phpmyadmin.path -}}
{{- $host := .Values.ingress.host -}}
{{- if .Values.ingress.hosts -}}
{{- $host = first .Values.ingress.hosts -}}
{{- end -}}
{{- $absoluteUri := .Values.phpmyadmin.absoluteUri -}}
{{- if not $absoluteUri -}}
{{- $absoluteUri = printf "https://%s%s/" $host $pmaPath -}}
{{- end -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "laravel.fullname" . }}-phpmyadmin
  labels:
    {{- include "laravel.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: {{ include "laravel.fullname" . }}-phpmyadmin
  template:
    metadata:
      labels:
        app: {{ include "laravel.fullname" . }}-phpmyadmin
    spec:
      containers:
        - name: phpmyadmin
          image: "{{ .Values.phpmyadmin.image.repository }}:{{ .Values.phpmyadmin.image.tag }}"
          imagePullPolicy: {{ .Values.phpmyadmin.image.pullPolicy }}
          env:
            - name: PMA_ARBITRARY
              value: {{ if .Values.phpmyadmin.arbitrary }}"1"{{ else }}"0"{{ end }}
            - name: PMA_ABSOLUTE_URI
              value: {{ $absoluteUri | quote }}
            - name: UPLOAD_LIMIT
              value: {{ .Values.phpmyadmin.uploadLimit | quote }}
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.phpmyadmin.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "laravel.fullname" . }}-phpmyadmin
  labels:
    {{- include "laravel.labels" . | nindent 4 }}
spec:
  selector:
    app: {{ include "laravel.fullname" . }}-phpmyadmin
  ports:
    - port: 80
      targetPort: http
      name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "laravel.fullname" . }}-phpmyadmin-ingress
  annotations:
    # Strip the /devmyphpadmin prefix so phpMyAdmin (served from /) receives the
    # bare request path. Kept on this dedicated ingress so it never affects the
    # main application routes.
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/proxy-body-size: {{ .Values.phpmyadmin.uploadLimit | quote }}
    {{- with .Values.phpmyadmin.ingress.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  labels:
    name: {{ include "laravel.fullname" . }}-phpmyadmin-ingress
    {{- include "laravel.labels" . | nindent 4 }}
spec:
  ingressClassName: nginx
  rules:
    - host: {{ $host }}
      http:
        paths:
          - pathType: ImplementationSpecific
            path: {{ printf "%s(/|$)(.*)" $pmaPath | quote }}
            backend:
              service:
                name: {{ include "laravel.fullname" . }}-phpmyadmin
                port:
                  name: http
  tls:
    # Reuse the certificate the main ingress already provisions for this host
    # (no cert-manager annotation here, so no duplicate certificate order).
    - hosts:
        - {{ $host }}
      secretName: {{ include "laravel.fullname" . }}-certificate
{{- end }}
